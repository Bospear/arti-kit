name: Build & Deploy Artikit

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t artikit:latest .

      - name: Save Docker image to tar
        run: docker save artikit:latest | gzip > artikit.tar.gz

      - name: Copy image to server
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          sshpass -p "$SERVER_PASSWORD" \
            scp -o StrictHostKeyChecking=no \
            artikit.tar.gz \
            "${SERVER_USERNAME}@storybook.bospear.com:/tmp/artikit.tar.gz"
        env:
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: storybook.bospear.com
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            docker load -i /tmp/artikit.tar.gz
            rm /tmp/artikit.tar.gz
            docker stop artikit 2>/dev/null || true
            docker rm artikit 2>/dev/null || true
            docker run -d \
              --name artikit \
              --restart unless-stopped \
              -p 6006:80 \
              artikit:latest
            docker image prune -f
